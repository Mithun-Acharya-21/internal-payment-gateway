<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Internal Payment Gateway Dashboard</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 2rem; max-width: 920px; }
    h1 { margin-bottom: 0.25rem; }
    .card { border: 1px solid #ddd; border-radius: 8px; padding: 1rem; margin: 1rem 0; }
    input, button { padding: 0.5rem; margin: 0.25rem 0; }
    code { background: #f4f4f4; padding: 0.15rem 0.3rem; border-radius: 4px; }
    pre { background: #0f172a; color: #e2e8f0; padding: 1rem; border-radius: 8px; overflow: auto; }
  </style>
</head>
<body>
  <h1>Internal Payment Gateway</h1>
  <p>Demo dashboard for quick API checks.</p>

  <div class="card">
    <h3>Health Check</h3>
    <button id="healthBtn">Run /healthz</button>
  </div>

  <div class="card">
    <h3>Create Wallet</h3>
    <input id="token" placeholder="Bearer token (without Bearer prefix)" style="width:100%" />
    <input id="userId" placeholder="user_id" value="demo_user" />
    <button id="createWalletBtn">Create Wallet</button>
  </div>

  <h3>Output</h3>
  <pre id="output">Ready...</pre>

  <script>
    const out = document.getElementById("output");
    const setOut = (v) => out.textContent = typeof v === "string" ? v : JSON.stringify(v, null, 2);

    document.getElementById("healthBtn").addEventListener("click", async () => {
      try {
        const res = await fetch("/healthz");
        setOut(await res.json());
      } catch (e) { setOut(String(e)); }
    });

    document.getElementById("createWalletBtn").addEventListener("click", async () => {
      const token = document.getElementById("token").value.trim();
      const userId = document.getElementById("userId").value.trim();
      try {
        const res = await fetch("/api/v1/wallets", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": `Bearer ${token}`
          },
          body: JSON.stringify({ user_id: userId, currency: "INR" })
        });
        setOut(await res.json());
      } catch (e) { setOut(String(e)); }
    });
  </script>
</body>
</html>
