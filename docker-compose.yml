version: "3.9"

services:
  # ── Application ────────────────────────────────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: payment-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      APP_ENV: production
      PORT: "8080"
      DATABASE_URL: postgres://pguser:pgpass@postgres:5432/paymentdb?sslmode=disable
      JWT_SECRET: ${JWT_SECRET}
      RATE_LIMIT_RPS: "100"
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gateway-net
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/healthz"]
      interval: 15s
      timeout: 5s
      retries: 3

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: payment-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: paymentdb
      POSTGRES_USER: pguser
      POSTGRES_PASSWORD: pgpass
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "5432:5432"
    networks:
      - gateway-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pguser -d paymentdb"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Adminer (DB UI for dev) ────────────────────────────────────────────────
  adminer:
    image: adminer:4
    container_name: payment-adminer
    restart: unless-stopped
    ports:
      - "8081:8080"
    networks:
      - gateway-net
    profiles:
      - dev

volumes:
  postgres-data:

networks:
  gateway-net:
    driver: bridge
